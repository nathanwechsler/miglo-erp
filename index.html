<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miglo ERP – Seguimiento OC</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #FE5E19; --orange-light: #fff0eb;
  --gray: #DCDCDC; --gray-dark: #6b7280; --gray-mid: #f3f4f6;
  --white: #ffffff; --text: #1a1a1a;
  --green: #16a34a; --green-bg: #dcfce7;
  --yellow: #d97706; --yellow-bg: #fef3c7;
  --red: #dc2626; --red-bg: #fee2e2;
  --radius: 10px; --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
body { font-family: 'Inter', sans-serif; background: #f7f7f7; color: var(--text); min-height: 100vh; }

/* LOGIN SCREEN */
#loginScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #fff0eb 0%, #f7f7f7 100%);
}
.login-card {
  background: white; border-radius: 18px; padding: 48px 40px; text-align: center;
  box-shadow: 0 8px 40px rgba(254,94,25,0.12); max-width: 380px; width: 100%;
}
.login-logo { width: 56px; height: 56px; background: var(--orange); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
.login-logo svg { width: 30px; height: 30px; }
.login-brand { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.login-brand span { color: var(--orange); }
.login-sub { font-size: 13px; color: var(--gray-dark); margin-bottom: 32px; }
.login-divider { font-size: 12px; color: var(--gray-dark); margin-bottom: 20px; }
.login-error { background: var(--red-bg); color: var(--red); padding: 10px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }

/* APP */
#appScreen { display: none; }
.header {
  background: var(--white); border-bottom: 3px solid var(--orange);
  padding: 0 28px; display: flex; align-items: center; justify-content: space-between;
  height: 60px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-box { width: 36px; height: 36px; background: var(--orange); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
.logo-box svg { width: 20px; height: 20px; }
.brand { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.brand span { color: var(--orange); }
.subtitle { font-size: 11px; color: var(--gray-dark); }
.header-right { display: flex; align-items: center; gap: 20px; }
.header-stats { display: flex; gap: 22px; }
.hstat-val { font-size: 20px; font-weight: 700; color: var(--orange); line-height: 1; text-align: right; }
.hstat-lbl { font-size: 10px; color: var(--gray-dark); text-transform: uppercase; letter-spacing: 0.5px; text-align: right; }
.sync-status { font-size: 11px; color: var(--gray-dark); display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray-dark); }
.sync-dot.ok { background: var(--green); }
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.err { background: var(--red); }
.user-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray-dark); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--orange); display:none; }
.user-initials { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--orange); background: var(--orange); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-logout { background: none; border: 1.5px solid var(--gray); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-family: 'Inter', sans-serif; cursor: pointer; color: var(--gray-dark); }
.btn-logout:hover { border-color: var(--red); color: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.main { padding: 24px 28px; max-width: 1100px; margin: 0 auto; }
.toolbar { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }
.btn-primary { background: var(--orange); color: white; border: none; padding: 9px 18px; border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.btn-primary:hover { opacity: 0.88; }
.btn-secondary { background: var(--white); color: var(--text); border: 1.5px solid var(--gray); padding: 8px 16px; border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-secondary:hover { border-color: var(--orange); color: var(--orange); }
.search-box { flex: 1; min-width: 180px; padding: 8px 14px; border: 1.5px solid var(--gray); border-radius: var(--radius); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
.search-box:focus { border-color: var(--orange); }
.filters { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.pill { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--gray); background: white; color: var(--gray-dark); }
.pill:hover { border-color: var(--orange); color: var(--orange); }
.pill.active { background: var(--orange); color: white; border-color: var(--orange); font-weight: 600; }
.pill.active:hover { opacity: 0.88; color: white; }
.oc-grid { display: flex; flex-direction: column; gap: 12px; }
.oc-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); border-left: 4px solid var(--gray); overflow: visible; }
.oc-card.pendiente { border-left-color: var(--red); }
.oc-card.parcial { border-left-color: var(--yellow); }
.oc-card.completa { border-left-color: var(--green); }
.oc-header { padding: 14px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; user-select: none; }
.oc-header:hover { background: var(--orange-light); }
.oc-num { font-size: 14px; font-weight: 700; color: var(--orange); min-width: 80px; }
.oc-client { font-size: 14px; font-weight: 600; flex: 1; }
.oc-date { font-size: 12px; color: var(--gray-dark); min-width: 90px; }
.oc-progress-wrap { min-width: 130px; display: flex; align-items: center; gap: 8px; }
.oc-progress-bar { flex: 1; height: 6px; background: var(--gray); border-radius: 3px; overflow: hidden; }
.oc-progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.oc-pct { font-size: 12px; font-weight: 600; min-width: 34px; text-align: right; }
.badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; min-width: 72px; text-align: center; }
.badge.pendiente { background: var(--red-bg); color: var(--red); }
.badge.parcial { background: var(--yellow-bg); color: var(--yellow); }
.badge.completa { background: var(--green-bg); color: var(--green); }
.chevron { color: var(--gray-dark); transition: transform 0.2s; font-size: 12px; }
.chevron.open { transform: rotate(180deg); }
.docs-wrap { position: relative; }
.docs-btn { background: none; border: 1.5px solid var(--gray); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; color: var(--gray-dark); font-family: 'Inter', sans-serif; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.docs-btn:hover { border-color: var(--orange); color: var(--orange); }
.docs-btn.has-docs { border-color: var(--green); color: var(--green); background: var(--green-bg); }
.docs-dropdown { position: absolute; right: 0; top: calc(100% + 4px); background: white; border: 1.5px solid var(--gray); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 220px; z-index: 200; overflow: hidden; }
.docs-dropdown-item { display: flex; align-items: center; gap: 8px; padding: 9px 14px; font-size: 12px; cursor: pointer; color: var(--text); border-bottom: 1px solid var(--gray-mid); }
.docs-dropdown-item:last-child { border-bottom: none; }
.docs-dropdown-item:hover { background: var(--orange-light); color: var(--orange); }
.docs-dropdown-item.add { color: var(--orange); font-weight: 600; }
.docs-dropdown-item .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.docs-dropdown-item .doc-del { color: var(--gray-dark); font-size: 14px; padding: 0 2px; }
.docs-dropdown-item .doc-del:hover { color: var(--red); }
.icon-btn { background: none; border: 1.5px solid var(--gray); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 13px; }
.icon-btn:hover { border-color: var(--red); }
.oc-items { border-top: 1px solid var(--gray-mid); padding: 14px 18px 16px; display: none; }
.oc-items.open { display: block; }
.items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.items-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-dark); font-weight: 600; padding: 6px 10px; border-bottom: 1.5px solid var(--gray); background: var(--gray-mid); }
.items-table td { padding: 8px 10px; border-bottom: 1px solid var(--gray-mid); vertical-align: middle; }
.items-table tr:last-child td { border-bottom: none; }
.items-table tbody tr:hover td { background: var(--orange-light); }
.qty-delivered { display: flex; align-items: center; gap: 6px; }
.qty-input { width: 62px; padding: 4px 8px; border: 1.5px solid var(--gray); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 13px; text-align: center; outline: none; }
.qty-input:focus { border-color: var(--orange); }
.qty-total { color: var(--gray-dark); font-size: 12px; }
.item-bar { width: 70px; height: 5px; background: var(--gray); border-radius: 3px; display: inline-block; overflow: hidden; vertical-align: middle; margin-right: 5px; }
.item-bar-fill { height: 100%; border-radius: 3px; }
.item-pct { font-size: 12px; font-weight: 600; }
.add-item-btn { background: none; border: 1.5px dashed var(--gray); border-radius: 6px; padding: 5px 12px; font-size: 12px; color: var(--gray-dark); cursor: pointer; font-family: 'Inter', sans-serif; }
.add-item-btn:hover { border-color: var(--orange); color: var(--orange); }
.obs-input { width: 100%; padding: 5px 8px; border: 1.5px solid transparent; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text); background: transparent; resize: none; outline: none; min-height: 28px; }
.obs-input:hover { border-color: var(--gray); background: white; }
.obs-input:focus { border-color: var(--orange); background: white; }
.loading { text-align: center; padding: 60px 20px; color: var(--gray-dark); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--gray); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 20px; color: var(--gray-dark); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: white; border-radius: 14px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.modal h2 span { color: var(--orange); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--gray-dark); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
.form-group input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray); border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; }
.form-group input:focus { border-color: var(--orange); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.item-builder-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
.item-builder-row .form-group { flex: 1; margin-bottom: 0; }
.item-builder-row .form-group.narrow { max-width: 80px; }
.remove-item-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--gray-dark); padding: 0 4px; line-height: 1; }
.remove-item-btn:hover { color: var(--red); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--gray); }
.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 20 20" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg>
    </div>
    <div class="login-brand">Comercial <span>Miglo</span></div>
    <div class="login-sub">Seguimiento de Órdenes de Compra</div>
    <div class="login-divider">Inicia sesión con tu cuenta Prime Chef</div>
    <div id="g_id_onload"
      data-client_id="1053887417861-1i2ce27vkhpj633pvrj3gphb6mcugl45.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="signin_with"
      data-shape="rectangular"
      data-logo_alignment="left"
      data-width="300">
    </div>
    <div class="login-error" id="loginError">
      ⛔ Acceso denegado. Solo cuentas @primechef.cl pueden ingresar.
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <div class="header">
    <div class="header-left">
      <div class="logo-box">
        <svg viewBox="0 0 20 20" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg>
      </div>
      <div>
        <div class="brand">Comercial <span>Miglo</span></div>
        <div class="subtitle">Seguimiento de Órdenes de Compra</div>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Conectando…</span></div>
      <div class="header-stats" id="headerStats"></div>
      <div class="user-info">
        <img class="user-avatar" id="userAvatar" src="" alt="">
<div class="user-initials" id="userInitials"></div>
        <span id="userName"></span>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button class="btn-primary" onclick="openNewModal()">＋ Nueva OC</button>
      <button class="btn-secondary" onclick="loadData()">↻ Actualizar</button>
      <input class="search-box" type="text" id="searchInput" placeholder="Buscar por N° OC o cliente…" oninput="renderOCs()">
    </div>
    <div class="filters">
      <span class="pill active" onclick="toggleFilter('pendiente',this)">🔴 Pendiente</span>
      <span class="pill active" onclick="toggleFilter('parcial',this)">🟡 Parcial</span>
      <span class="pill active" onclick="toggleFilter('completa',this)">🟢 Completa</span>
    </div>
    <div class="oc-grid" id="ocGrid">
      <div class="loading"><div class="spinner"></div><p>Cargando desde Google Sheets…</p></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2><span>Nueva</span> Orden de Compra</h2>
    <div class="form-row">
      <div class="form-group"><label>N° de OC</label><input type="text" id="f_num" placeholder="OC-001"></div>
      <div class="form-group"><label>Fecha de Emisión</label><input type="date" id="f_fecha"></div>
    </div>
    <div class="form-group"><label>Cliente</label><input type="text" id="f_cliente" placeholder="Nombre del cliente"></div>
    <div class="form-group">
      <label>Ítems</label>
      <div id="itemsBuilder"></div>
      <button class="add-item-btn" onclick="addItemRow()" style="margin-top:8px">＋ Agregar ítem</button>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveOC()">Guardar OC</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/a/macros/primechef.cl/s/AKfycbw3TgY9fSmffqIeuhNgRkcQ-kMdqb2NbpLYlm3aC3fOoqKsRn23Mlh-dQ-4Hp8XBahk4Q/exec';
const ALLOWED_DOMAIN = 'primechef.cl';

let ocs = [], expanded = {}, tempItems = [], saving = false;

// ── AUTH ──────────────────────────────────────────────────────────────────
function handleCredentialResponse(response) {
  const payload = parseJwt(response.credential);
  const email = payload.email || '';
  if (!email.endsWith('@' + ALLOWED_DOMAIN)) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  // Mostrar app
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
const avatar = document.getElementById('userAvatar');
const initials = document.getElementById('userInitials');
const name = payload.name || email;
document.getElementById('userName').textContent = name;
if (payload.picture) {
  avatar.src = payload.picture;
  avatar.style.display = 'block';
  initials.style.display = 'none';
  avatar.onerror = function() {
    avatar.style.display = 'none';
    initials.style.display = 'flex';
  };
} else {
  avatar.style.display = 'none';
  initials.style.display = 'flex';
}
const parts = name.trim().split(' ');
initials.textContent = parts.length >= 2
  ? parts[0][0].toUpperCase() + parts[1][0].toUpperCase()
  : parts[0][0].toUpperCase();
  loadData();
}

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(atob(base64));
}

function logout() {
  google.accounts.id.disableAutoSelect();
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginError').style.display = 'none';
  ocs = []; expanded = {};
}

// ── SYNC STATUS ──────────────────────────────────────────────────────────
function setSyncStatus(state, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}

// ── API ──────────────────────────────────────────────────────────────────
async function loadData() {
  setSyncStatus('syncing', 'Cargando…');
  try {
    const res = await fetch(API, { redirect: 'follow' });
    const data = await res.json();
    ocs = Array.isArray(data) ? data : [];
    ocs.forEach(oc => {
      if (oc.facturaUrl && (!oc.docs || !oc.docs.length)) {
        oc.docs = [{ name: oc.facturaName || 'Factura', url: oc.facturaUrl, id: '' }];
      }
    });
    setSyncStatus('ok', 'Sincronizado');
    render();
  } catch(e) {
    setSyncStatus('err', 'Error de conexión');
    document.getElementById('ocGrid').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>No se pudo conectar</h3><p>Verifica que el Apps Script esté publicado correctamente.</p></div>`;
  }
}

async function saveOC(oc) {
  setSyncStatus('syncing', 'Guardando…');
  try {
    await fetch(API, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'save_oc', oc })
    });
    setSyncStatus('ok', 'Guardado ✓');
  } catch(e) {
    setSyncStatus('err', 'Error al guardar');
    toast('⚠ No se pudo guardar en Sheets');
  }
}

async function deleteOC(id) {
  setSyncStatus('syncing', 'Eliminando…');
  try {
    await fetch(API, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'delete_oc', id })
    });
    setSyncStatus('ok', 'Eliminado ✓');
  } catch(e) {
    setSyncStatus('err', 'Error al eliminar');
    toast('⚠ No se pudo eliminar');
  }
}

async function saveAll() {
  setSyncStatus('syncing', 'Guardando…');
  try {
    await fetch(API, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'save_all', ocs })
    });
    setSyncStatus('ok', 'Guardado ✓');
  } catch(e) {
    setSyncStatus('err', 'Error al guardar');
    toast('⚠ No se pudo guardar en Sheets');
  }
}

// ── COMPUTE ──────────────────────────────────────────────────────────────
function getStatus(oc) {
  const tot = oc.items.reduce((s,i) => s + i.cantidad, 0);
  const del = oc.items.reduce((s,i) => s + Math.min(i.entregado, i.cantidad), 0);
  if (del === 0) return 'pendiente';
  if (del >= tot) return 'completa';
  return 'parcial';
}
function getPct(oc) {
  const tot = oc.items.reduce((s,i) => s + i.cantidad, 0);
  if (!tot) return 0;
  const del = oc.items.reduce((s,i) => s + Math.min(i.entregado, i.cantidad), 0);
  return Math.round((del/tot)*100);
}
function pctColor(p) {
  if (p === 0) return 'var(--red)';
  if (p === 100) return 'var(--green)';
  return 'var(--yellow)';
}

let activeFilters = new Set(['pendiente','parcial','completa']);
function toggleFilter(f, el) {
  if (activeFilters.has(f)) {
    if (activeFilters.size === 1) return;
    activeFilters.delete(f); el.classList.remove('active');
  } else {
    activeFilters.add(f); el.classList.add('active');
  }
  renderOCs();
}
function filtered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return ocs.filter(oc => {
    const st = getStatus(oc);
    return activeFilters.has(st) && (!q || oc.num.toLowerCase().includes(q) || oc.cliente.toLowerCase().includes(q));
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() { renderStats(); renderOCs(); }
function renderStats() {
  const pend = ocs.filter(o => getStatus(o)==='pendiente').length;
  const parc = ocs.filter(o => getStatus(o)==='parcial').length;
  const comp = ocs.filter(o => getStatus(o)==='completa').length;
  document.getElementById('headerStats').innerHTML = `
    <div class="hstat"><div class="hstat-val">${ocs.length}</div><div class="hstat-lbl">Total OC</div></div>
    <div class="hstat"><div class="hstat-val" style="color:var(--yellow)">${parc}</div><div class="hstat-lbl">En curso</div></div>
    <div class="hstat"><div class="hstat-val" style="color:var(--red)">${pend}</div><div class="hstat-lbl">Pendiente</div></div>
    <div class="hstat"><div class="hstat-val" style="color:var(--green)">${comp}</div><div class="hstat-lbl">Completa</div></div>`;
}
function renderOCs() {
  renderStats();
  const list = filtered();
  const grid = document.getElementById('ocGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>Sin OC para mostrar</h3><p>Agrega una nueva OC o cambia los filtros.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(oc => {
    const st = getStatus(oc); const pct = getPct(oc); const open = !!expanded[oc.id];
    const label = {pendiente:'Pendiente',parcial:'Parcial',completa:'Completa'}[st];
    const rows = oc.items.map(item => {
      const ip = item.cantidad > 0 ? Math.round((Math.min(item.entregado,item.cantidad)/item.cantidad)*100) : 0;
      return `<tr>
        <td>${item.nombre}</td>
        <td style="color:var(--gray-dark)">${item.unidad}</td>
        <td><div class="qty-delivered">
          <input class="qty-input" type="number" min="0" max="${item.cantidad}" value="${item.entregado}"
            onchange="updateDelivered('${oc.id}','${item.id}',this.value)">
          <span class="qty-total">/ ${item.cantidad}</span>
        </div></td>
        <td><span class="item-bar"><span class="item-bar-fill" style="width:${ip}%;background:${pctColor(ip)}"></span></span>
          <span class="item-pct" style="color:${pctColor(ip)}">${ip}%</span></td>
        <td><textarea class="obs-input" rows="1" placeholder="Agregar observación…"
          onchange="updateObs('${oc.id}','${item.id}',this.value)">${item.obs||''}</textarea></td>
        <td><button class="icon-btn" onclick="delItem('${oc.id}','${item.id}')">🗑</button></td>
      </tr>`;
    }).join('');
    return `<div class="oc-card ${st}">
      <div class="oc-header" onclick="toggleExpand('${oc.id}')">
        <div class="oc-num">${oc.num}</div>
        <div class="oc-client">${oc.cliente}</div>
        <div class="oc-date">${fmtDate(oc.fecha)}</div>
        <div class="oc-progress-wrap">
          <div class="oc-progress-bar"><div class="oc-progress-fill" style="width:${pct}%;background:${pctColor(pct)}"></div></div>
          <span class="oc-pct" style="color:${pctColor(pct)}">${pct}%</span>
        </div>
        <span class="badge ${st}">${label}</span>
        <div class="docs-wrap">
          <button class="docs-btn ${oc.docs&&oc.docs.length?'has-docs':''}" onclick="event.stopPropagation();toggleDocsMenu('${oc.id}')">
            📁 Documentos ${oc.docs&&oc.docs.length?`(${oc.docs.length})`:''} ▾
          </button>
          <div class="docs-dropdown hidden" data-docs-id="${oc.id}" onclick="event.stopPropagation()">
            ${(oc.docs||[]).map((d,i)=>`
            <div class="docs-dropdown-item">
              <span>📄</span>
              <span class="doc-name" onclick="window.open('${d.url}','_blank')" title="${d.name}">${d.name}</span>
              <span class="doc-del" onclick="delDoc('${oc.id}',${i})" title="Eliminar">🗑</span>
            </div>`).join('')}
            <div class="docs-dropdown-item add" onclick="triggerUpload('${oc.id}')">＋ Agregar documento</div>
          </div>
          <input type="file" id="file-${oc.id}" accept="image/*,.pdf" style="display:none" onchange="uploadDoc('${oc.id}',this)">
        </div>
        <button class="icon-btn" onclick="event.stopPropagation();delOC('${oc.id}')">🗑</button>
        <span class="chevron ${open?'open':''}">▼</span>
      </div>
      <div class="oc-items ${open?'open':''}">
        <table class="items-table">
          <thead><tr><th>Producto</th><th>Unidad</th><th>Entregado</th><th>Avance</th><th>Observaciones</th><th></th></tr></thead>
          <tbody>${rows}
            <tr><td colspan="5"><button class="add-item-btn" onclick="promptAddItem('${oc.id}')">＋ Agregar ítem</button></td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id) { expanded[id] = !expanded[id]; renderOCs(); }
function fmtDate(d) { if(!d) return '—'; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }

// ── MUTATIONS ────────────────────────────────────────────────────────────
function updateDelivered(ocId, itemId, val) {
  const oc = ocs.find(o=>o.id===ocId); if (!oc) return;
  const item = oc.items.find(i=>i.id===itemId); if (!item) return;
  item.entregado = Math.max(0, Math.min(item.cantidad, parseInt(val)||0));
  saveOC(oc); renderOCs(); toast('✓ Entrega actualizada');
}
function updateObs(ocId, itemId, val) {
  const oc = ocs.find(o=>o.id===ocId); if (!oc) return;
  const item = oc.items.find(i=>i.id===itemId); if (!item) return;
  item.obs = val.trim(); saveOC(oc); toast('✓ Observación guardada');
}
function delItem(ocId, itemId) {
  const oc = ocs.find(o=>o.id===ocId); if (!oc) return;
oc.items = oc.items.filter(i=>i.id!==itemId); saveOC(oc); renderOCs(); toast('Ítem eliminado');
}
function toggleDocsMenu(ocId) {
  const btn = document.querySelector(`[data-docs-id="${ocId}"]`);
  if (!btn) return;
  const isHidden = btn.classList.contains('hidden');
  document.querySelectorAll('.docs-dropdown').forEach(m => m.classList.add('hidden'));
  if (isHidden) btn.classList.remove('hidden');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.docs-wrap')) document.querySelectorAll('.docs-dropdown').forEach(m => m.classList.add('hidden'));
});
function triggerUpload(ocId) { closeDocsMenus(); document.getElementById('file-'+ocId).click(); }
function closeDocsMenus() { document.querySelectorAll('.docs-dropdown').forEach(m => m.classList.add('hidden')); }
async function uploadDoc(ocId, input) {
  const file = input.files[0]; if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('⚠ El archivo no debe superar 5MB'); return; }
  toast('⏳ Subiendo documento…');
  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64 = e.target.result.split(',')[1];
    try {
      const res = await fetch(API, {
        method: 'POST', redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'upload_file', data: base64, mimeType: file.type, filename: file.name })
      });
      const data = await res.json();
      if (data.ok) {
        const oc = ocs.find(o=>o.id===ocId);
        if (oc) { if (!oc.docs) oc.docs = []; oc.docs.push({ name: file.name, url: data.url, id: data.id }); }
        saveOC(oc); renderOCs(); toast('✓ Documento adjuntado');
      } else { toast('⚠ Error al subir archivo'); }
    } catch(err) { toast('⚠ Error de conexión'); }
    input.value = '';
  };
  reader.readAsDataURL(file);
}
function delDoc(ocId, idx) {
  const oc = ocs.find(o=>o.id===ocId); if (!oc||!oc.docs) return;
  oc.docs.splice(idx, 1); saveOC(oc); renderOCs(); toast('Documento eliminado');

}
function delOC(id) {
  if (!confirm('¿Eliminar esta OC permanentemente?')) return;
ocs = ocs.filter(o=>o.id!==id); delete expanded[id]; deleteOC(id); render(); toast('OC eliminada');
}
function promptAddItem(ocId) {
  const nombre = prompt('Nombre del producto:'); if (!nombre) return;
  const cantStr = prompt('Cantidad:'); const cantidad = parseInt(cantStr); if (!cantidad||cantidad<1) return;
  const unidad = prompt('Unidad (und, kg, pack…):', 'und') || 'und';
  const oc = ocs.find(o=>o.id===ocId); if (!oc) return;
oc.items.push({ id:uid(), nombre, unidad, cantidad, entregado:0 }); expanded[ocId] = true; saveOC(oc); renderOCs(); toast('✓ Ítem agregado');
}

// ── MODAL ────────────────────────────────────────────────────────────────
function openNewModal() {
  tempItems = [{ id:uid(), nombre:'', unidad:'und', cantidad:1 }];
  document.getElementById('f_num').value = '';
  document.getElementById('f_fecha').value = todayStr();
  document.getElementById('f_cliente').value = '';
  renderBuilder();
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
function closeModalOutside(e) { if (e.target.id==='modalOverlay') closeModal(); }
function renderBuilder() {
  document.getElementById('itemsBuilder').innerHTML = tempItems.map((it,idx) => `
    <div class="item-builder-row">
      <div class="form-group">${idx===0?'<label>Producto</label>':''}
        <input type="text" placeholder="Nombre" value="${it.nombre}" oninput="tempItems[${idx}].nombre=this.value"></div>
      <div class="form-group narrow">${idx===0?'<label>Cantidad</label>':''}
        <input type="number" min="1" value="${it.cantidad}" style="text-align:center" oninput="tempItems[${idx}].cantidad=parseInt(this.value)||1"></div>
      <div class="form-group narrow">${idx===0?'<label>Unidad</label>':''}
        <input type="text" placeholder="und" value="${it.unidad}" oninput="tempItems[${idx}].unidad=this.value"></div>
      <button class="remove-item-btn" onclick="removeBuilderItem(${idx})" style="margin-top:${idx===0?'20':'0'}px">×</button>
    </div>`).join('');
}
function addItemRow() { tempItems.push({id:uid(),nombre:'',unidad:'und',cantidad:1}); renderBuilder(); }
function removeBuilderItem(idx) { if(tempItems.length>1){tempItems.splice(idx,1);renderBuilder();} }
function saveOC() {
  const num = document.getElementById('f_num').value.trim();
  const cliente = document.getElementById('f_cliente').value.trim();
  const fecha = document.getElementById('f_fecha').value;
  if (!num||!cliente) { toast('⚠ Completa N° OC y cliente'); return; }
  const items = tempItems.filter(i=>i.nombre.trim()).map(i=>({...i,entregado:0}));
  if (!items.length) { toast('⚠ Agrega al menos un ítem'); return; }
const newOC = {id:uid(),num,cliente,fecha,items}; ocs.unshift(newOC); saveOC(newOC); closeModal(); render(); toast('✓ OC creada');

}

// ── UTILS ────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,10); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

setInterval(() => { if (document.getElementById('appScreen').style.display !== 'none') loadData(); }, 30000);
</script>
</body>
